mainprefix = "z"
prefix = "aas"

name = "ADAPTATIVE ARMA SUPPORTS (AAS - Core)"

[properties]
author = "KOLOVIAN"
url = "https://github.com/KOLOVIAN/Adaptative-Arma-Supports-Core"

[binarize]
enabled = true # Default: true

[files]
include = [
    "mod.cpp",      # These files are copied to the build directory by default
    "meta.cpp",     # They do not need to be added to your list
    "LICENSE",
    "/img/*.paa",
    "logo_ca.paa",
    "logo_co.paa",
	"/assets/*.paa",
    "*.bikey",
    "DiscordRichPresence*.dll",
	"/addons/*.pbo",
	"addons/*.bisign",
	"$PBOPREFIX$"
]
exclude = [
    "*.psd",        # By default this list is empty
    "*.md",
    "/.vscode/",
]

[version]
path = "addons/main/script_version.hpp" # Default
# major = 0 # Overrides path when set
# minor = 1
# patch = 1
# git_hash = 4 # Default: 8